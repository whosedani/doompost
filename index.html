<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doom Posting</title>
  <meta name="description" content="DOOMPOST. doompost your pain.">
  <meta property="og:image" content="/static/doompost.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background falling charts -->
  <div class="bg-charts">
    <svg width="300" height="600" style="top:5%;left:3%;transform:rotate(-8deg)" viewBox="0 0 300 600">
      <path d="M10 50 L50 80 L90 60 L130 120 L170 100 L210 200 L250 180 L290 400" stroke="#E83B3B" fill="none" stroke-width="2"/>
    </svg>
    <svg width="250" height="500" style="top:10%;right:5%;transform:rotate(5deg)" viewBox="0 0 250 500">
      <path d="M10 30 L60 50 L100 40 L140 110 L180 150 L220 350" stroke="#E83B3B" fill="none" stroke-width="2"/>
    </svg>
    <svg width="350" height="700" style="top:30%;left:8%;transform:rotate(-12deg)" viewBox="0 0 350 700">
      <path d="M10 20 L70 60 L120 30 L180 150 L230 130 L280 300 L340 550" stroke="#E83B3B" fill="none" stroke-width="1.5"/>
    </svg>
    <svg width="280" height="550" style="top:40%;right:10%;transform:rotate(8deg)" viewBox="0 0 280 550">
      <path d="M10 40 L50 70 L100 50 L150 160 L200 200 L260 450" stroke="#E83B3B" fill="none" stroke-width="1.5"/>
    </svg>
    <svg width="200" height="450" style="top:60%;left:15%;transform:rotate(-5deg)" viewBox="0 0 200 450">
      <path d="M10 20 L50 55 L90 35 L130 120 L170 280 L190 400" stroke="#E83B3B" fill="none" stroke-width="2"/>
    </svg>
    <svg width="320" height="600" style="top:55%;right:2%;transform:rotate(10deg)" viewBox="0 0 320 600">
      <path d="M10 30 L80 70 L140 45 L200 180 L260 250 L310 500" stroke="#E83B3B" fill="none" stroke-width="1.5"/>
    </svg>
    <svg width="260" height="500" style="top:80%;left:5%;transform:rotate(-3deg)" viewBox="0 0 260 500">
      <path d="M10 25 L60 65 L110 40 L160 140 L210 200 L250 420" stroke="#E83B3B" fill="none" stroke-width="2"/>
    </svg>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <button class="header-btn" id="caBtn" title="Copy CA">CA</button>
      <a class="header-btn" id="twitterLink" href="#" target="_blank" rel="noopener">Twitter</a>
      <a class="header-btn" id="communityLink" href="#" target="_blank" rel="noopener" title="Community">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="4"/>
          <circle cx="9" cy="10" r="2"/>
          <circle cx="15" cy="10" r="2"/>
          <circle cx="12" cy="16" r="2"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <!-- Hero -->
    <h1 class="ticker">DOOMPOST</h1>
    <img class="hero-img" src="static/doompost.png" alt="trader staring at red monitors at 3am">


    <!-- DoomPost block -->
    <div class="doom-block">
      <div class="reason-card" id="reasonCard">
        <p class="reason-text" id="reasonText"></p>
      </div>
      <p class="reason-hint">click to doom harder</p>
      <button class="doom-btn" id="doomBtn">doompost</button>
    </div>

    <!-- All reasons -->
    <section class="reasons-section">
      <h2 class="reasons-title">All The Reasons I'm Leaving</h2>
      <ul class="reasons-list" id="reasonsList"></ul>
    </section>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast">doom acknowledged.</div>

  <script src="script.js"></script>
</body>
</html>
