<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doom Posting — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #111015;
      --chart-red: #E83B3B;
      --monitor-glow: #2A1F3D;
      --exhausted-white: #C8C2BC;
      --ash: #5A5458;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--void);
      color: var(--exhausted-white);
      font-family: 'Geist Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .admin-card {
      width: min(440px, 100%);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(232,59,59,0.15);
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    h1 {
      font-family: 'Anybody', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: var(--chart-red);
      text-align: center;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(232,59,59,0.3);
    }
    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--ash);
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(232,59,59,0.15);
      color: var(--exhausted-white);
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--chart-red);
    }
    .field { display: flex; flex-direction: column; }
    .btn {
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .btn-primary {
      background: var(--chart-red);
      color: var(--void);
    }
    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(232,59,59,0.4);
    }
    .btn-save {
      background: var(--monitor-glow);
      color: var(--exhausted-white);
      border: 1px solid rgba(232,59,59,0.15);
    }
    .btn-save:hover {
      border-color: var(--chart-red);
    }
    .status {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      text-align: center;
      min-height: 20px;
    }
    .status.ok { color: #4ade80; }
    .status.err { color: var(--chart-red); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="admin-card">
    <h1>DOOM ADMIN</h1>

    <div id="loginSection">
      <div class="field">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Enter admin password">
      </div>
      <button class="btn btn-primary" id="loginBtn" style="margin-top:12px;width:100%">LOGIN</button>
    </div>

    <div id="configSection" class="hidden">
      <div class="field">
        <label>Contract Address</label>
        <input type="text" id="cfgCA" placeholder="Token CA">
      </div>
      <div class="field">
        <label>Twitter URL</label>
        <input type="url" id="cfgTwitter" placeholder="https://x.com/...">
      </div>
      <div class="field">
        <label>Community URL</label>
        <input type="url" id="cfgCommunity" placeholder="https://t.me/...">
      </div>
      <div class="field">
        <label>Buy URL</label>
        <input type="url" id="cfgBuy" placeholder="https://...">
      </div>
      <button class="btn btn-save" id="saveBtn" style="width:100%">SAVE CONFIG</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    let passwordHash = '';

    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('adminPass').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
    document.getElementById('saveBtn').addEventListener('click', saveConfig);

    fetch('/api/config')
      .then(r => r.json())
      .then(cfg => {
        if (cfg.ca) document.getElementById('cfgCA').value = cfg.ca;
        if (cfg.twitter) document.getElementById('cfgTwitter').value = cfg.twitter;
        if (cfg.community) document.getElementById('cfgCommunity').value = cfg.community;
        if (cfg.buy) document.getElementById('cfgBuy').value = cfg.buy;
      })
      .catch(() => {});

    async function hashPassword(pass) {
      const encoded = new TextEncoder().encode(pass);
      const buffer = await crypto.subtle.digest('SHA-256', encoded);
      return Array.from(new Uint8Array(buffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    async function login() {
      const pass = document.getElementById('adminPass').value;
      if (!pass) return;
      passwordHash = await hashPassword(pass);
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('configSection').classList.remove('hidden');
      setStatus('Logged in. Edit config below.', 'ok');
    }

    async function saveConfig() {
      const cfg = {
        hash: passwordHash,
        ca: document.getElementById('cfgCA').value.trim(),
        twitter: document.getElementById('cfgTwitter').value.trim(),
        community: document.getElementById('cfgCommunity').value.trim(),
        buy: document.getElementById('cfgBuy').value.trim(),
      };

      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          setStatus('Config saved.', 'ok');
        } else {
          setStatus(data.error || 'Failed to save.', 'err');
        }
      } catch (e) {
        setStatus('Network error.', 'err');
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + (type || '');
    }
  </script>
</body>
</html>
